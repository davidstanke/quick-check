name: Deploy to prod

on:
    push:
        branches:
            - main
        paths-ignore:
            - "docs/**"
            - "adrs/**"
            - ".gemini/**"
            - "**/README.md"
    schedule:
        - cron: "0 7 * * *"
    workflow_dispatch:

defaults:
    run:
        shell: bash

jobs:
    deploy-service:
        runs-on: ubuntu-latest
        permissions:
            contents: "read"
            id-token: "write"
        steps:
            - uses: "actions/checkout@v6"

            - uses: "google-github-actions/auth@v3"
              with:
                  workload_identity_provider: "projects/55325855002/locations/global/workloadIdenti\
                      tyPools/github-actions/providers/github-provider"
                  # service_account: 'my-service-account@my-project.iam.gserviceaccount.com'

            - id: "deploy"
              uses: "google-github-actions/deploy-cloudrun@v3"
              with:
                  service: "hello-cloud-run"
                  image: "us-docker.pkg.dev/cloudrun/container/hello:latest"

            - name: "Use output"
              run: "curl \"${{ steps.deploy.outputs.url }}\""
